<!DOCTYPE html>

<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <title>Trivia!</title>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            let incorrect = document.querySelectorAll(".Incorrect");
            for (let i = 0; i < incorrect.length; i++) {
                incorrect[i].addEventListener("click", function (event) {
                    event.target.style.backgroundColor = "red";
                    document.querySelector('#feedbackText').innerHTML = 'Incorrect';
                });
            }
            const correct = document.querySelector(".Correct");
            correct.addEventListener("click", function (event) {
                event.target.style.backgroundColor = "green";
                document.querySelector('#feedbackText').innerHTML = 'Correct';
            });

            document.querySelector('#check').addEventListener('click', function () {
                let input = document.querySelector('input');
                if (input.value.trim().toLowerCase() === 'kidney') {
                    input.style.backgroundColor = 'green';
                    document.querySelector('#feedbackText2').innerHTML = "Correct!"
                }
                else {
                    input.style.backgroundColor = 'red';
                    document.querySelector('#feedbackText2').innerHTML = 'Incorrect';
                }
            })
        }); 
    </script>
</head>

<body>
    <div class="header">
        <h1>Trivia!</h1>
    </div>

    <div class="container">
        <div class="section">
            <h2>Part 1: Multiple Choice </h2>
            <hr>
            <h3>What is the largest organ of the human body?</h3>
            <!-- TODO: Add multiple choice question here -->
            <button class="Incorrect">The heart</button>
            <button class="Incorrect">The liver</button>
            <button class="Correct">The skin</button>
            <button class="Incorrect">The brain</button>
            <button class="Incorrect">The stomach</button>
            <p id="feedbackText"></p>

        </div>

        <div class="section">
            <h2>Part 2: Free Response</h2>
            <hr>
            <h3>Which organ filters blood and makes urine?</h3>
            <input type="text" id="input">
            <button id="check">Check Answer</button>
            <p id="feedbackText2"></p>


        </div>
    </div>
</body>

</html>
